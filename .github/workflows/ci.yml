# MoonBit 社区标准 CI 工作流
# 参考: https://github.com/moonbit-community/.github/tree/main/workflow-templates
#
# 硬性要求四步: moon check · moon fmt · moon info · moon test
# --deny-warn 仅 moon check 支持；moon fmt / moon info 使用
# moon <cmd> && git diff --exit-code 达到等价效果。
#
# 注意: 官方下载服务器 cli.moonbitlang.com 存在 CDN 限制，
# 因此使用 chawyehsu/setup-moonup 通过备用镜像安装 MoonBit 工具链。

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  check-test-lint:
    name: Check, Test, Lint & Demo
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          persist-credentials: false

      - name: Setup MoonBit toolchain
        uses: chawyehsu/setup-moonup@v2.0.0
        with:
          moonbit-version: latest

      - name: Toolchain info
        run: moon version --all

      - name: Update package registry
        run: moon update

      # ──────────────────────────────────────────────────
      # 步 1/5 — moon check --deny-warn（类型检查）
      # --deny-warn 将警告提升为错误，可拦截 `extend` 等保留字风险
      # ──────────────────────────────────────────────────
      - name: "① moon check --deny-warn"
        run: moon check --target all --deny-warn

      # ──────────────────────────────────────────────────
      # 步 2/5 — moon fmt --deny-warn（代码格式检查）
      # moon fmt 不支持 --deny-warn 参数，改用等价做法：
      # moon fmt && git diff --exit-code
      # ──────────────────────────────────────────────────
      - name: "② moon fmt --deny-warn"
        run: moon fmt && git diff --exit-code

      # ──────────────────────────────────────────────────
      # 步 3/5 — moon info --deny-warn（公开接口一致性检查）
      # moon info 不支持 --deny-warn 参数，改用等价做法：
      # moon info && git diff --exit-code
      # ──────────────────────────────────────────────────
      - name: "③ moon info --deny-warn"
        run: moon info && git diff --exit-code

      # ──────────────────────────────────────────────────
      # 步 4/5 — moon test（运行全部测试用例）
      # 该项目已有 311 个测试用例，覆盖所有 11 个确定性数据结构
      # ──────────────────────────────────────────────────
      - name: "④ moon test"
        run: moon test --target all

      # ──────────────────────────────────────────────────
      # 步 5/5 — moon run（可执行演示）
      # 验证 cmd/main 作为可执行程序能正常运行并产生输出
      # ──────────────────────────────────────────────────
      - name: "⑤ moon run cmd/main"
        run: moon run cmd/main
